# ─────────────────────────────────────────────────────────────────────────────
# 生产环境部署模板 —— 从 Docker Hub 拉镜像（CI 已经把镜像推上去了）
#
# 用法：
#   1. 创建 .env，至少写：
#        IMAGE=myfinal12/frp-manager
#        TAG=latest
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
#
# 升级：
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# 国内拉 Docker Hub 慢/不通时，在 /etc/docker/daemon.json 加 registry-mirrors：
#   {"registry-mirrors": ["https://docker.m.daocloud.io", "https://docker.1ms.run"]}
#   sudo systemctl restart docker
# ─────────────────────────────────────────────────────────────────────────────

services:
  frp-manager:
    image: ${IMAGE:-myfinal12/frp-manager}:${TAG:-latest}
    container_name: frp-manager
    platform: linux/amd64
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # 可选：强制锁定 profile，启动即可用
      # FRPC_CONFIG_PATH: /opt/dockerApp/frpc/frpc.toml
      # FRPC_RELOAD_TYPE: admin-api
      # FRPC_ADMIN_BASE_URL: http://host.docker.internal:7400
      #
      # ─── 安全相关（强烈建议设置） ─────────────────────────────────
      # 1) 路径白名单：Setup 页填的 configPath 必须在这些根目录下，否则 403。
      #    多个值用分号 ; 分隔。
      # FRP_MANAGER_ALLOWED_CONFIG_ROOTS: "/opt/dockerApp/frpc"
      # 2) CORS：默认禁跨域；UI 与 API 同域时无需设置。
      # FRP_MANAGER_CORS_ORIGINS: "https://frp.example.com"
    volumes:
      # 1) 持久化 profile.json
      - ./runtime:/app/runtime

      # 1.1) 持久化 auth.json（登录密码 hash + token 签名密钥）
      - ./config:/app/config

      # 2) 把宿主上 frpc 目录挂进容器，宿主与容器路径保持一致
      - /opt/dockerApp/frpc:/opt/dockerApp/frpc

      # 3) reload 策略 = docker / docker-compose 时挂 socket
      - /var/run/docker.sock:/var/run/docker.sock
      # - /opt/frp/docker-compose.yml:/opt/frp/docker-compose.yml
